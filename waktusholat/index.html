<!DOCTYPE html>
<html lang="id">
<head>

<title>Jadwal Sholat Indonesia</title>

<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta http-equiv="pragma" content="no-cache" />
<meta http-equiv="expires" content="-1" />
<meta name="viewport" content="width=device-width; initial-scale=1.0; maximum-scale=1.0;"/>
<link rel="icon" href="favicon.ico" />
<link rel="stylesheet" type="text/css" href="css/style.css">
</head>
<body>

<div class="container">

<h1>🕌 Jadwal Sholat Indonesia</h1>
<div class="row print-header">
<img alt="logoku" id="logo" />
<h2>MADRASATUL QUR'AN TEBUIRENG JOMBANG</h2>
<div id="printLokasi"></div>
</div>
<select id="pilihKota"></select>

<div class="info">
  <div id="jam"></div>
  <div id="lokasiText">Memuat lokasi...</div>
  <div id="tanggalText"></div>

  <div class="waktu-container">

  <div class="waktu-card imsak-card">
    <span class="label">Imsak</span>
    <span class="time" id="imsak"></span>
  </div>

  <div class="waktu-card subuh-card">
    <span class="label">Subuh</span>
    <span class="time" id="subuh"></span>
  </div>

  <div class="waktu-card dzuhur-card">
    <span class="label">Dhuhur</span>
    <span class="time" id="dzuhur"></span>
  </div>

   <div class="waktu-card ashar-card">
    <span class="label">Ashar</span>
    <span class="time" id="ashar"></span>
  </div>

  <div class="waktu-card maghrib-card">
    <span class="label">Maghrib</span>
    <span class="time" id="maghrib"></span>
  </div>

  <div class="waktu-card isya-card">
    <span class="label">Isya</span>
    <span class="time" id="isya"></span>
  </div>

</div>

  <div id="countdown" class="countdown"></div>
</div>

<div style="margin-top:15px;">
  <button onclick="printJadwal()" class="btn-print">🖨 Print / Save PDF</button>
  <button onclick="exportExcel()" class="btn-print">📊 Export Excel</button>
</div>

<div class="jadwal-card">
  <h2 id="judulBulan">📅Jadwal Lengkap</h2>
  <div class="table-wrapper">
    <table id="tabelJadwal">
      <thead>
        <tr>
          <th>Tgl</th>
          <th>Imsak</th>
          <th>Subuh</th>
          <th>Terbit</th>
          <th>Dzuhur</th>
          <th>Ashar</th>
          <th>Maghrib</th>
          <th>Isya</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>
<footer>
  <div class="footer-copyright">
    <div class="footer-copyright-wrapper">

      <div id="footerPhoto"></div>

      <p class="footer-copyright-text">
        <a
          class="footer-copyright-link"
          id="footer"
          href="#"
          target="_self">
        </a>
      </p>

    </div>
  </div>
</footer>
</div>
<script src="js/praytimesenc.js"></script>
</body>
</html>
